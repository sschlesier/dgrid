name: Linux E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install tauri-webdriver
        run: cargo install tauri-webdriver

      - name: Run Linux E2E suite
        env:
          DGRID_E2E_PRESERVE_APP_BINARY_ON_FAILURE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" pnpm e2e:ci

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-e2e-results
          if-no-files-found: warn
          retention-days: 14
          path: |
            tests/webdriver/artifacts/wdio-junit.xml
            tests/webdriver/artifacts/ci-summary.md

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-e2e-failure-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: |
            tests/webdriver/artifacts/**
