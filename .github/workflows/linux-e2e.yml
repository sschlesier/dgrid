name: Linux E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      release_only: ${{ steps.detect.outputs.release_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - name: Detect release-only changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            echo "release_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$base" "$head")

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "release_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${files[@]}"; do
            case "$file" in
              CHANGES.md|package.json|src-tauri/Cargo.toml|src-tauri/Cargo.lock|src-tauri/tauri.conf.json)
                ;;
              *)
                echo "release_only=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          done

          echo "release_only=true" >> "$GITHUB_OUTPUT"

  e2e-linux:
    needs: changes
    if: ${{ needs.changes.outputs.release_only != 'true' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install tauri-webdriver
        run: cargo install tauri-webdriver

      - name: Run Linux E2E suite
        env:
          DGRID_E2E_PRESERVE_APP_BINARY_ON_FAILURE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" pnpm e2e:ci

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: linux-e2e-results
          if-no-files-found: warn
          retention-days: 14
          path: |
            tests/webdriver/artifacts/wdio-junit*.xml
            tests/webdriver/artifacts/ci-summary.md

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: linux-e2e-failure-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: |
            tests/webdriver/artifacts/**
